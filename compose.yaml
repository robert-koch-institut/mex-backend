services:
  mex-backend:
    build:
      context: .
    ports:
      - 8080:8080
    environment:
      - MEX_GRAPH_URL=neo4j://neo4j:7687
      - MEX_BACKEND_VALKEY_URL=valkey://valkey:6379
    expose:
      - 8080
    healthcheck:
      test: [ "CMD", "curl", "http://0.0.0.0:8080/v0/_system/check" ]
      interval: 60s
      timeout: 5s
      retries: 5
  neo4j:
    image: neo4j:2026.01-community
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_usage__report_enabled=false
    ports:
      - 7687:7687
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  valkey:
    image: valkey/valkey:9.0.3
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  slapd:
    image: thoteam/slapd-server-mock
    platform: linux/amd64
    ports:
      - 636:636
    volumes:
      - ./assets/raw-data/ldap/:/bootstrap/
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-o", "tls_reqcert=never", "-H", "ldaps://localhost:636", "-b", "dc=ldapmock,dc=local", "-D", "cn=admin,dc=ldapmock,dc=local", "-w", "adminpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
