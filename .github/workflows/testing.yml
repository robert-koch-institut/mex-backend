name: Testing

on:
  push:
    branches: ["main"]
    tags: ["**"]
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

env:
  PIP_DISABLE_PIP_VERSION_CHECK: on
  PIP_NO_CLEAN: on
  PIP_NO_INPUT: on
  PIP_PREFER_BINARY: on
  PY_COLORS: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Cache requirements
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          key: ${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ env.cache-name }}-

      - name: Cache environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        env:
          cache-name: cache-environment
        with:
          path: ~/.cache/pip
          key: ${{ env.cache-name }}-${{ hashFiles('*.lock') }}
          restore-keys: |
            ${{ env.cache-name }}-

      - name: Setup python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14

      - name: Start containers
        run: docker compose up --wait neo4j valkey slapd dex

      - name: Install requirements
        run: make install

      - name: Run test suite
        env:
          MEX_GRAPH_URL: neo4j://localhost:7687
          MEX_BACKEND_VALKEY_URL: valkey://localhost:6379
          MEX_LDAP_URL: ldap://cn=admin,dc=ldapmock,dc=local:adminpass@localhost:636
          MEX_LDAP_SEARCH_BASE: dc=ldapmock,dc=local
          MEX_OIDC_ISSUER_URL: http://localhost:5556/dex
          MEX_OIDC_CLIENT_ID: mex-backend
          MEX_BACKEND_OIDC_GROUPS_DATABASE: '{"read":["Abteilung_21","Fachgebiet_99"],"write":["Abteilung_21"]}'
        run: make test

      - name: Cleanup containers
        if: always()
        run: docker compose down neo4j valkey slapd dex
